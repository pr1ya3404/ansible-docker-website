- name: Deploy Nginx container
  hosts: local
  become: yes

  tasks:
 
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes
   
    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Run Nginx container
      command: docker run -d -p 8080:80 nginx
